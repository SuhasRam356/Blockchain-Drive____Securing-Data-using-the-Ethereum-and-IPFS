specVersion: 0.0.8
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: UploadUpgradeableV6
    network: sepolia
    source:
      address: "0xd7F39943769411C40470DE6151a892557C2ecf02" # Proxy address
      abi: UploadUpgradeableV6
      startBlock: 11219910
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - File
        - Access
        - UserMetric
        - ActivityEvent
      abis:
        - name: UploadUpgradeableV6
          file: ./abis/UploadUpgradeableV6.json
      eventHandlers:
        - event: FileAdded(indexed address,indexed address,string,string)
          handler: handleFileAdded
        - event: FileDeleted(indexed address,string)
          handler: handleFileDeleted
        - event: AccessGranted(indexed address,indexed address,uint256)
          handler: handleAccessGranted
        - event: AccessRevoked(indexed address,indexed address)
          handler: handleAccessRevoked
        - event: PublicKeyPublished(indexed address,string)
          handler: handlePublicKeyPublished
      file: ./src/mapping.ts
